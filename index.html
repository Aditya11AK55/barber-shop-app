<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Beauty Parlour</title>

    <!-- Inline CSS (English) -->
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:Arial, sans-serif; color:#333; line-height:1.6; }
        header { background:#ff69b4; color:#fff; padding:1rem; text-align:center; }
        header nav a { margin:0 1rem; color:#fff; text-decoration:none; }
        section { padding:2rem 1rem; max-width:800px; margin:auto; }
        h2 { margin-bottom:0.5rem; }
        .grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(200px,1fr)); gap:1rem; }
        .grid img { width:100%; border-radius:8px; }
        form { display:flex; flex-direction:column; }
        input, textarea { margin-bottom:0.5rem; padding:0.5rem; border:1px solid #ccc; border-radius:4px; }
        button { background:#ff69b4; color:#fff; border:none; padding:0.6rem; cursor:pointer; border-radius:4px; }
        footer { background:#f0f0f0; text-align:center; padding:1rem; margin-top:2rem; }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <h1>Beauty Parlour</h1>
        <nav>
            <a href="#about">हमारे बारे में</a>
            <a href="#services">सेवाएँ</a>
            <a href="#gallery">गैलरी</a>
            <a href="#contact">संपर्क</a>
        </nav>
    </header>

    <!-- About Section -->
    <section id="about">
        <h2>हमारे बारे में</h2>
        <p>हम आपके सौंदर्य की देखभाल के लिए सर्वोत्तम सेवाएँ प्रदान करते हैं।</p>
    </section>

    <!-- Services Section -->
    <section id="services">
        <h2>सेवाएँ</h2>
        <ul>
            <li>हेयरकट</li>
            <li>मैकेअप</li>
            <li>स्किनकेयर</li>
            <li>स्पा ट्रीटमेंट</li>
        </ul>
    </section>

    <!-- Gallery Section -->
    <section id="gallery">
        <h2>गैलरी</h2>
        <div class="grid">
            <!-- Place your images inside a folder named "assets" -->
            <img src="assets/img1.jpg" alt="सैलून 1">
            <img src="assets/img2.jpg" alt="सैलून 2">
            <img src="assets/img3.jpg" alt="सैलून 3">
        </div>
    </section>

    <!-- Contact Section -->
    <section id="contact">
        <h2>संपर्क करें</h2>
        <form id="contactForm">
            <input type="text" placeholder="नाम" required>
            <input type="email" placeholder="ई‑मेल" required>
            <textarea placeholder="संदेश" rows="4" required></textarea>
            <button type="submit">भेजें</button>
        </form>
    </section>

    <footer>
        <p>© 2026 Beauty Parlour. सभी अधिकार सुरक्षित।</p>
    </footer>

    <!-- Inline JavaScript (English) -->
    <script>
        // Simple form submission handler
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();               // prevent real submit
            alert('धन्यवाद! हम जल्द ही आपसे संपर्क करेंगे।');
            this.reset();                     // clear the form
        });
    </script>
</body>
</html>
