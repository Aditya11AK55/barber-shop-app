<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Owner Security Login</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #111; color: #fff; padding: 20px; }
        .login-box { max-width: 420px; margin: 60px auto; background: #222; padding: 30px; border-radius: 10px; border: 2px solid #ffcc00; box-shadow: 0px 4px 20px rgba(255,204,0,0.2); }
        h2 { text-align: center; color: #ffcc00; margin-bottom: 25px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #ccc; font-size: 14px; }
        input { width: 93%; padding: 10px; margin-bottom: 20px; border-radius: 5px; border: 1px solid #444; background: #333; color: white; font-size: 15px; }
        input:focus { border-color: #ffcc00; outline: none; }
        .btn-login { width: 100%; background: #ffcc00; color: black; font-weight: bold; padding: 12px; font-size: 16px; border: none; border-radius: 5px; cursor: pointer; }
        .btn-login:hover { background: #fff; }
    </style>
</head>
<body>
<div class="login-box">
    <h2>👑 Owner Security Verification</h2>
    <form method="POST" action="/admin">
        <label>👤 Owner Full Name:</label>
        <input type="text" name="owner_name" placeholder="Enter Owner Name" required>

        <label>📞 Mobile Number:</label>
        <input type="text" name="owner_phone" placeholder="Enter Mobile Number" required>

        <label>🔄 Confirm Mobile Number:</label>
        <input type="text" name="confirm_phone" placeholder="Re-enter Mobile Number" required>

        <label>📅 Date of Birth:</label>
        <input type="date" name="owner_dob" required>

        <button type="submit" class="btn-login">Verify & Open Dashboard →</button>
    </form>
</div>
</body>
</html>
