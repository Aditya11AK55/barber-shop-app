<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Confirm Your Appointment</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial, sans-serif; background-color: #1a1a1a; color: #fff; padding: 20px; margin: 0; text-align: center; }
        .confirm-box { background: #2d2d2d; padding: 30px 20px; border-radius: 12px; border: 2px solid #ffcc00; max-width: 450px; margin: 40px auto; box-shadow: 0 8px 16px rgba(0,0,0,0.5); }
        h2 { color: #ffcc00; margin-top: 0; font-size: 24px; }
        .details-list { text-align: left; background: #383838; padding: 15px; border-radius: 8px; margin: 20px 0; font-size: 16px; line-height: 1.8; }
        .details-list strong { color: #ffcc00; }
        .btn-container { display: flex; gap: 15px; justify-content: center; }
        .action-btn { padding: 12px 24px; font-weight: bold; font-size: 15px; border: none; border-radius: 6px; cursor: pointer; text-decoration: none; width: 100%; text-align: center; }
        .confirm-btn { background: #2ecc71; color: white; }
        .cancel-btn { background: #ff4757; color: white; }
    </style>
</head>
<body>

<div class="confirm-box">
    <h2>📋 Confirm Your Appointment</h2>
    <p style="color: #aaa; font-size: 14px;">Please review your booking details below before final submission.</p>
    
    <div class="details-list">
        <div><strong>Customer Name:</strong> {{ name }}</div>
        <div><strong>Mobile Number:</strong> {{ phone }}</div>
        <div><strong>Selected Date:</strong> {{ date }}</div>
        <div><strong>Selected Time:</strong> {{ time }}</div>
        <div><strong>Assigned Seat:</strong> {{ seat }}</div>
    </div>

    <form action="/book" method="POST">
        <input type="hidden" name="date" value="{{ date }}">
        <input type="hidden" name="time" value="{{ time }}">
        <input type="hidden" name="seat" value="{{ seat }}">
        
        <div class="btn-container">
            <a href="/" class="action-btn cancel-btn">❌ Cancel</a>
            <button type="submit" class="action-btn confirm-btn">✅ Book Appointment</button>
        </div>
    </form>
</div>

</body>
</html>
