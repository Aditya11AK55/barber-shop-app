<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Confirm Your Appointment</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #1a1a1a; color: #fff; padding: 20px; }
        .confirm-box { max-width: 500px; margin: 50px auto; background: #2d2d2d; padding: 30px; border-radius: 10px; border: 1px solid #ffcc00; box-shadow: 0px 4px 15px rgba(0,0,0,0.5); text-align: center; }
        h2 { color: #ffcc00; margin-bottom: 20px; }
        .info-panel { background: #383838; padding: 15px; border-radius: 6px; text-align: left; margin-bottom: 20px; line-height: 1.8; font-size: 16px; }
        .info-panel strong { color: #ffcc00; }
        input[type="date"] { padding: 10px; width: 80%; font-size: 16px; border-radius: 5px; border: 1px solid #ffcc00; background: #1a1a1a; color: #fff; font-weight: bold; margin-bottom: 20px; }
        .btn-submit { background: #ffcc00; color: #000; font-weight: bold; padding: 12px 30px; font-size: 16px; border: none; border-radius: 5px; cursor: pointer; display: block; width: 100%; margin-top: 10px; }
        .btn-submit:hover { background: #fff; }
    </style>
</head>
<body>
<div class="confirm-box">
    <h2>🎯 Confirm Appointment</h2>
    
    <div class="info-panel">
        👤 <strong>Customer Name:</strong> {{ user.name }} <br>
        📞 <strong>Mobile Number:</strong> {{ user.phone }} <br>
        ⏰ <strong>Selected Time:</strong> {{ slot }} <br>
        🪑 <strong>Chosen Chair:</strong> {{ seat }}
    </div>

    <form method="POST" action="/book_slot">
        <input type="hidden" name="slot" value="{{ slot }}">
        <input type="hidden" name="seat" value="{{ seat }}">
        
        <label style="display:block; margin-bottom: 10px; font-weight: bold; color: #aaa;">📅 Verify/Select Booking Date:</label>
        <input type="date" id="booking_date" name="booking_date" value="{{ booking_date }}" required>
        
        <button type="submit" class="btn-submit">Book Appointment ✓</button>
    </form>
    
    <br>
    <a href="/booking" style="color: #ffcc00; text-decoration: none; font-size: 14px;">← Change Mind & Go Back</a>
</div>

<script>
    // कैलेंडर में आज से लेकर अगले 30 दिन की सीमा को लॉक करने की कोडिंग
    var today = new Date();
    var dd = String(today.getDate()).padZero();
    var mm = String(today.getMonth() + 1).padZero();
    var yyyy = today.getFullYear();
    var minDate = yyyy + '-' + mm + '-' + dd;
    
    var maxTarget = new Date();
    maxTarget.setDate(today.getDate() + 30);
    var max_dd = String(maxTarget.getDate()).padZero();
    var max_mm = String(maxTarget.getMonth() + 1).padZero();
    var max_yyyy = maxTarget.getFullYear();
    var maxDate = max_yyyy + '-' + max_mm + '-' + max_dd;

    String.prototype.padZero = function() {
        return this.length < 2 ? '0' + this : this;
    }
    Date.prototype.padZero = function() {
        return String(this).length < 2 ? '0' + this : this;
    }

    document.getElementById('booking_date').setAttribute('min', minDate);
    document.getElementById('booking_date').setAttribute('max', maxDate);
</script>
</body>
</html>
