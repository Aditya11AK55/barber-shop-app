<!DOCTYPE html>
<html>
<head>
    <title>Super Admin Login</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #111; color: #00ff00; text-align: center; padding-top: 100px; }
        .box { background: #222; padding: 30px; display: inline-block; border: 1px solid #00ff00; border-radius: 5px; }
        input { background: #333; color: #00ff00; border: 1px solid #00ff00; padding: 10px; margin: 10px; width: 250px; }
        button { background: #00ff00; color: black; font-weight: bold; padding: 10px 20px; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2>🕵️ DEVELOPER MASTER LOGIN</h2>
        <form method="POST">
            <input type="text" name="username" placeholder="Developer Username" required><br>
            <input type="password" name="password" placeholder="Master Password" required><br>
            <button type="submit">ACCESS SYSTEM</button>
        </form>
    </div>
</body>
</html>
