<!DOCTYPE html>
<html>
<head>
    <title>Customer Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; text-align: center; padding-top: 50px; }
        .box { background: white; padding: 30px; display: inline-block; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); width: 85%; max-width: 400px; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; font-size: 16px; border-radius: 5px; cursor: pointer; width: 95%; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Customer Login 🔐</h2>
        <form method="POST">
            <input type="number" name="phone" placeholder="Enter Mobile Number" required><br>
            <input type="password" name="password" placeholder="Enter Password" required><br>
            <button type="submit">Login</button>
        </form>
        <p>New user? <a href="/signup">Create an Account</a></p>
    </div>
</body>
</html>
